<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <meta name="viewport" content="width=device-width" />
        <title>Selector0073</title>
        <link rel="stylesheet" href="{{ get_url(path="main.css") | safe }}" />
        <link rel="stylesheet" href="{{ get_url(path="skills.css") | safe }}" />
    </head>
    <body>
        <header>
            <nav class="navbar fixed-top navbar-expand-lg">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Selector0073</a>
                    <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                        aria-controls="navbarNavAltMarkup" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav">
                            <a class="nav-link" href="#SkillsScroll">Skills</a>
                            <a class="nav-link" href="#ProjectsScroll">Projects</a>
                            <a class="nav-link" href="#QaAScroll">Q&A</a>
                            <a class="nav-link" href="#ContactScroll">Contact</a>
                        </div>
                    </div>
                </div>
            </nav>
        </header>
        <main>
            {% block content %} {% endblock content %}
        </main>
        <footer>
            <nav class="navbar sticky-bottom ">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Sticky bottom</a>
                </div>
            </nav>
        </footer>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
