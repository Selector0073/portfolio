---
import Layout from '../layouts/Layout.astro';
import Plane from '../components/plane.astro';
import data from '../data/data.json';


---

<Layout>
	<h1>Selector0073</h1>
	<div class="container mt-4">
		<div class="row g-3">
			<div class="col-6">
				<div class="box box-1">
					<Plane>
						aaa
					</Plane>
				</div>
			</div>
			
			<div class="col-6">
				<div class="box box-2">
					<Plane>
						sss
					</Plane>
				</div>
			</div>
			
			<div class="col-12">
				<div class="box box-3">
					<Plane>
						Skills:
						{skillsArray.map((skill) => (
							<li key={skill.Name}>
								<a href={skill.Link}>{skill.Name}</a>
							</li>
						))}
					</Plane>
				</div>
			</div>
		</div>
	</div>
</Layout>
